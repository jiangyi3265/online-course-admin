name: Deploy wkht Admin

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-wkht-admin
  cancel-in-progress: true

env:
  DEPLOY_HOST: 47.108.175.236
  DEPLOY_USER: root
  DEPLOY_PORT: "22"
  DEPLOY_PATH: /www/wwwroot/wwwht.yzzhixue.cn

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          : > ~/.ssh/known_hosts

      - name: Upload admin files
        shell: bash
        run: |
          set -euo pipefail
          test -d dist
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ConnectionAttempts=1 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SCP_OPTS="-O -i ~/.ssh/deploy_key -P $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ConnectionAttempts=1 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ARCHIVE="wkht-admin.tar.gz"

          retry() {
            local max="$1"
            shift
            local i
            for i in $(seq 1 "$max"); do
              if "$@"; then
                return 0
              fi
              [ "$i" = "$max" ] && return 1
              sleep $((i * 10))
            done
          }

          tar -C dist -czf "$ARCHIVE" .
          du -h "$ARCHIVE"
          echo "Creating remote admin deploy directory..."
          retry 6 timeout 90s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' '$DEPLOY_PATH/.deploy'"
          echo "Uploading admin archive..."
          retry 4 timeout 8m scp $SCP_OPTS "$ARCHIVE" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.deploy/$ARCHIVE"
          echo "Extracting admin archive..."
          retry 6 timeout 2m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf '$DEPLOY_PATH/.deploy/$ARCHIVE' -C '$DEPLOY_PATH' && if id www >/dev/null 2>&1; then chown -R www:www '$DEPLOY_PATH' 2>/dev/null || true; fi"
          echo "Inspecting admin nginx roots..."
          retry 3 timeout 60s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "grep -R -n -E 'server_name|root|listen .*443|ssl_certificate' /www/server/panel/vhost/nginx /etc/nginx 2>/dev/null | grep -C 3 'wwwht.yzzhixue.cn' || true"
          echo "Checking admin content served locally..."
          retry 3 timeout 60s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "set -e; echo 'DEPLOY_PATH index:'; ls -l '$DEPLOY_PATH/index.html'; grep -oE '(static|assets)/[^\"'\'']+' '$DEPLOY_PATH/index.html' | head -10 || true; echo 'HTTP localhost:'; curl -s -H 'Host: wwwht.yzzhixue.cn' http://127.0.0.1/ | grep -oE '(static|assets)/[^\"'\'']+' | head -10 || true; echo 'HTTPS localhost:'; curl -ks --resolve wwwht.yzzhixue.cn:443:127.0.0.1 https://wwwht.yzzhixue.cn/ | grep -oE '(static|assets)/[^\"'\'']+' | head -10 || true"
          echo "Ensuring admin HTTPS vhost points to admin root..."
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          CONF="/www/server/panel/vhost/nginx/wwwht.yzzhixue.cn.conf"
          MARK_BEGIN="# BEGIN wkht-admin-ssl"
          MARK_END="# END wkht-admin-ssl"
          cp "$CONF" "$CONF.bak_$(date +%Y%m%d%H%M%S)"
          if [ ! -f /etc/letsencrypt/live/wwwht.yzzhixue.cn/fullchain.pem ] && command -v certbot >/dev/null 2>&1; then
            certbot certonly --webroot -w "$DEPLOY_PATH" -d wwwht.yzzhixue.cn --non-interactive --agree-tos -m admin@yzzhixue.cn || true
          fi
          CERT="/etc/letsencrypt/live/wwwht.yzzhixue.cn/fullchain.pem"
          KEY="/etc/letsencrypt/live/wwwht.yzzhixue.cn/privkey.pem"
          if [ ! -f "$CERT" ] || [ ! -f "$KEY" ]; then
            CERT="/etc/letsencrypt/live/www.yzzhixue.cn/fullchain.pem"
            KEY="/etc/letsencrypt/live/www.yzzhixue.cn/privkey.pem"
          fi
          awk -v begin="$MARK_BEGIN" -v end="$MARK_END" '
            $0 == begin { skip=1; next }
            $0 == end { skip=0; next }
            !skip { print }
          ' "$CONF" > "$CONF.tmp"
          cat >> "$CONF.tmp" <<EOF
          $MARK_BEGIN
          server {
              listen 443 ssl http2;
              server_name wwwht.yzzhixue.cn;
              root $DEPLOY_PATH;
              index index.html;
              client_max_body_size 1100m;

              ssl_certificate $CERT;
              ssl_certificate_key $KEY;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /prod-api/ {
                  client_max_body_size 1100m;
                  proxy_request_buffering off;
                  proxy_set_header Host \$http_host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header REMOTE-HOST \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_pass http://127.0.0.1:8007/;
              }
          }
          $MARK_END
          EOF
          mv "$CONF.tmp" "$CONF"
          nginx -t
          nginx -s reload
          curl -ks --resolve wwwht.yzzhixue.cn:443:127.0.0.1 https://wwwht.yzzhixue.cn/ | grep -oE '(static|assets)/[^"'\'']+' | head -10 || true
          REMOTE
